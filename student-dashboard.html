 <div id="subjectModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">

<script>
     // MARKS (UPDATED LOGIC)
function calculateMarks(percentage) {
    if (percentage < 67) return 0;
    else if (percentage < 70) return 1.2;
    else if (percentage < 75) return 2.4;
    else if (percentage < 80) return 3.6;
    else if (percentage < 85) return 4.8;
    else return 6;
}

//calculateMARKS
function calculateSkip(present, total) {
    if (total === 0) return 0;

    const maxSkip = Math.floor(((present / 0.67) - total) + 0.0001);

    return maxSkip < 0 ? 0 : maxSkip;
}
function viewDetails(subjectName, percentage, present, total, marks) {
    document.getElementById("modalSubjectName").innerText = subjectName;
    document.getElementById("modalAttendance").innerText = percentage + "%";
    document.getElementById("modalPresent").innerText = present;
    document.getElementById("modalTotal").innerText = total;
    document.getElementById("modalMarks").innerText = marks;

    document.getElementById("subjectModal").classList.remove("hidden");
}

function closeModal() {
    document.getElementById("subjectModal").classList.add("hidden");
}

async function loadStudentData() {
    const enrollment = localStorage.getItem("userId");

    // 1. Get student info
    const res = await fetch(`http://127.0.0.1:5000/api/student/${enrollment}`);
    const student = await res.json();
    console.log("Student object:", student);
    console.log("Student:", student);
    console.log("Enrollment from localStorage:", enrollment);
    //console.log("Attendance Data:", attendance);

    if (student) {
        document.getElementById("studentName").innerText = student.name;
        document.getElementById("enrollment").innerText = "EN: " + student.enrollment_no;
document.getElementById("roll").innerText = "Roll: " + student.roll_no;
        // 2. Get attendance using student_id
        const attRes = await fetch(`http://127.0.0.1:5000/api/attendance/${student.student_id}`);
        const attendance = await attRes.json();
        // 🔥 LOAD SUBJECTS FROM DB

        //console.log("Attendance:", attendance);
        // 1. Fetch subjects
        const subRes = await fetch(`http://127.0.0.1:5000/api/student-subjects/${student.student_id}`);
const subjects = await subRes.json() || [];

const attRes2 = await fetch(`http://127.0.0.1:5000/api/subject-attendance/${student.student_id}`);
const attendanceMap = await attRes2.json() || {};

const container = document.getElementById("subjectsContainer");
container.innerHTML = "";

// 🔴 IF NO SUBJECTS
if (subjects.length === 0) {
    container.innerHTML = `
        <div class="col-span-full text-center text-slate-400">
            No subjects assigned yet
        </div>
    `;
} else {
    subjects.sort((a, b) => {
    const attA = attendanceMap[a.subject_id] || { percentage: 0 };
    const attB = attendanceMap[b.subject_id] || { percentage: 0 };

    return attA.percentage - attB.percentage; // ascending (worst first)
});
    subjects.forEach(sub => {
    const subjectId = sub.subject_id;
    const subjectName = sub.subjects.subject_name;
    const facultyName = sub.subjects.faculty?.name || "N/A";

    const att = attendanceMap[subjectId] || {
        present: 0,
        total: 0,
        percentage: 0
    };

    const skip = calculateSkip(att.present, att.total);

    let skipMsg = "";

    if (att.total === 0) {
        skipMsg = "No data";
    } else if (skip === 0) {
        skipMsg = "❌ You can't skip";
    } else if (skip === 1) {
        skipMsg = "⚠️ You can skip 1 class";
    } else {
        skipMsg = `✅ You can skip ${skip} classes`;
    }

        // MARKS
       

let marks = calculateMarks(att.percentage);

        // COLOR
        let color = "text-gray-400 bg-gray-100";
        if (att.total > 0) {
            if (att.percentage >= 88) color = "text-emerald-600 bg-emerald-50";
            else if (att.percentage >= 80) color = "text-blue-600 bg-blue-50";
            else if (att.percentage >= 67) color = "text-amber-600 bg-amber-50";
            else color = "text-red-600 bg-red-50";
        }

        container.innerHTML += `
            <div class="bg-white p-5 rounded-2xl border shadow-sm">
               <h3 class="font-bold text-slate-800 mb-1">${subjectName}</h3>
<p class="text-xs text-slate-400 mb-2">Faculty: ${facultyName}</p>

                <div class="flex justify-between mb-2">
                    <span class="px-2 py-1 text-xs font-bold rounded ${color}">
                        ${att.total > 0 ? att.percentage + "%" : "--"}
                    </span>
                    <span class="text-xs text-slate-400">
                        ${att.total > 0 ? marks.toFixed(1) + " Marks" : "--"}
                    </span>
                </div>

                <p class="text-xs text-slate-500 mb-1">
    ${att.total > 0 ? `Present: ${att.present} / ${att.total}` : "No attendance yet"}
</p>

<p class="text-[11px] font-semibold ${
    skip === 0 ? 'text-red-500' :
    skip === 1 ? 'text-amber-500' :
    'text-emerald-600'
}">
    ${skipMsg}
</p>

               <button onclick="viewDetails(
    '${subjectName}',
    ${att.percentage},
    ${att.present},
    ${att.total},
    '${marks.toFixed(1)} Marks'
)"
class="w-full py-2 bg-slate-100 text-xs rounded hover:bg-blue-600 hover:text-white transition">
View Details
</button>
            </div>
        `;
    });
}
        // 3. Show on UI
     // SAFE DATA EXTRACTION
const percentage = (attendance && attendance.total_classes > 0)
    ? attendance.percentage
    : 0;

const present = (attendance && attendance.present !== undefined)
    ? attendance.present
    : 0;

const total = (attendance && attendance.total_classes !== undefined)
    ? attendance.total_classes
    : 0;


// 🎯 UI UPDATE

// Attendance %
document.getElementById("attendance").innerText =
    total > 0 ? percentage + "%" : "--";

// Progress bar
document.getElementById("progressBar").style.width =
    total > 0 ? percentage + "%" : "0%";

// Present / Total
document.getElementById("present").innerText = total > 0 ? present : "--";
document.getElementById("total").innerText = total > 0 ? total : "--";
// 🔥 SKIP LOGIC
const skip = calculateSkip(present, total);

let message = "";

if (total === 0) {
    message = "No data available";
} else if (skip === 0) {
    message = "Attendance low! You cannot skip any class.";
} else if (skip === 1) {
    message = "Safe to skip 1 lecture only.";
} else {
    message = `Safe to skip ${skip} lectures.`;
}

document.getElementById("skipText").innerText = message;
// 🔥 UPDATE TOP MARKS
document.getElementById("marks").innerText =
    total > 0 ? calculateMarks(percentage).toFixed(1) : "--";
    }
    
}
// CALL FUNCTION ON PAGE LOAD
window.onload = loadStudentData;
</script>
