<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login | Digital Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-blue: #2563eb;
            --primary-hover: #1d4ed8;
            --text-gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(37, 99, 235, 0.7)),
                        url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=2070');
            background-size: cover;
            background-position: center;
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-header h2 {
            color: #1e293b;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .brand-header p {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .form-group { margin-bottom: 1.25rem; }

        .label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
        }

        .input-group { position: relative; }

        .input-field {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: white;
        }

        .field-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .helper {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .footer-links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: var(--text-gray);
            text-decoration: none;
        }

        .footer-links a:hover {
            color: var(--primary-blue);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-header">
            <div style="background: var(--primary-blue); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; margin: 0 auto 1rem; font-size: 1.4rem;">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h2>Portal Access</h2>
            <p>Digital Attendance System</p>
        </div>

        <form onsubmit="performLogin(event)">
            <div class="form-group">
                <label class="label">Identity</label>
                <div class="input-group">
                    <i class="fa-solid fa-user-tag field-icon"></i>
                    <select id="role" class="input-field" style="appearance: none; cursor: pointer;">
                        <option value="student">Student</option>
                        <option value="faculty">Faculty Member</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="label">ID Number</label>
                <div class="input-group">
                    <i class="fa-solid fa-id-card field-icon"></i>
                    <input type="text" id="login_id" class="input-field" placeholder="Enrollment ID / Faculty ID" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Password</label>
                <div class="input-group">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" id="password" class="input-field" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Login to Dashboard
            </button>

            <div class="helper">
                Accounts are pre-registered by the administrator.
            </div>
        </form>

        <div class="footer-links">
            <a href="admin-login.html">Admin Login</a> • <a href="ram_landing.html">Back to Home</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.protocol.startsWith('http')
            ? `${window.location.protocol}//${window.location.hostname || '127.0.0.1'}:5000`
            : 'http://127.0.0.1:5000';

        if (window.location.origin !== API_BASE) {
            window.location.replace(`${API_BASE}/login.html`);
        }

        async function performLogin(event) {
            event.preventDefault();

            const role = document.getElementById('role').value;
            const login_id = document.getElementById('login_id').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, login_id, password })
                });

                const payload = await response.json();
                const sessionData = payload.data || payload;

                if (!response.ok || payload.status !== 'success') {
                    throw new Error(payload.message || 'Invalid login credentials');
                }

                localStorage.setItem('userName', sessionData.name || '');
                localStorage.setItem('role', sessionData.role || role);

                if (sessionData.role === 'student') {
                    localStorage.setItem('userId', sessionData.enrollment_no || login_id);
                } else {
                    localStorage.setItem('userId', sessionData.employee_id || login_id);
                }

                if (!sessionData.redirect) {
                    throw new Error('Login succeeded but no redirect page was returned.');
                }

                window.location.href = `${API_BASE}/${sessionData.redirect}`;
            } catch (error) {
                console.error('Login error:', error);
                alert(error.message || 'Could not connect to the server. Make sure app.py is running.');
            }
        }
    </script>
</body>
</html>
