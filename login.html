        <form onsubmit="performLogin(event)">
        <div class="form-group">
            <label class="label">Identity</label>
            <div class="input-group">
                <i class="fa-solid fa-user-tag field-icon"></i>
                <select id="role" class="input-field" style="appearance: none; cursor: pointer;">
                    <option value="student">Student</option>
                    <option value="faculty">Faculty Member</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="label">ID Number (Email)</label>
            <div class="input-group">
                <i class="fa-solid fa-id-card field-icon"></i>
                <input type="text" id="login_id" class="input-field" placeholder=" Enrollment ID/Faculty ID" required>
            </div>
        </div>

       <div class="form-group">
    <label class="label">Password</label>
    <div class="input-group" style="position: relative;">
        
        <i class="fa-solid fa-lock field-icon"></i>
        
        <input type="password" id="password" placeholder="Enter password">


        <i onclick="togglePassword()" 
           class="fa-solid fa-eye"
           style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">
        </i>

    </div>
</div>

        <button type="submit" class="btn-submit">
            Login to Dashboard
        </button>
        <div class="signup-redirect" style="margin-top: 25px; text-align: center;">
            <p>New User? <a href="signup.html">Sign Up</a></p>
        </div>
    </form>

        <div class="footer-links">
            <a href="#">Forgot Password?</a> • <a href="#">Contact Admin</a>
        </div>

    <script>
        async function performLogin(e) {
            e.preventDefault();
            
            // 1. Get values from the IDs we added
            const role = document.getElementById('role').value;
            const login_id = document.getElementById('login_id').value;
            const password = document.getElementById('password').value;
            // Validation
if (!login_id || !password) {
    alert("Please fill all fields");
    return;
}
            try {
                // 2. Send data to your Python (app.py)
                const response = await fetch('http://127.0.0.1:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        role: role, 
                        login_id: login_id, 
                        password: password 
                    })
                });

                const data = await response.json();

                console.log(data); // 👈 ADD THIS

                if (data.status === "success") {
    // 🔥 STORE EVERYTHING CORRECTLY
    localStorage.setItem("userName", data.name);
    localStorage.setItem("role", data.role);
    localStorage.setItem("userId", data.enrollment_no);

    // ⚠️ MOST IMPORTANT LINE (FIX)
    //localStorage.setItem("userId", login_id);

    console.log("Stored userId:", login_id); // DEBUG

    window.location.href = data.redirect;
} else {
                alert(data.message || "Invalid login credentials");
            }
            } catch (error) {
                console.error("Error:", error);
                alert("Could not connect to the server. Make sure app.py is running!");
            }
        }
    // 👁️ TOGGLE PASSWORD VISIBILITY
    function togglePassword() {
        const pass = document.getElementById("password");

        if (pass.type === "password") {
            pass.type = "text";
        } else {
            pass.type = "password";
        }
    }
    </script>
