<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console | Digital Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --admin-bg: #020617;
            --accent-cyan: #38bdf8;
            --card-slate: #1e293b;
            --border-slate: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--admin-bg);
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Poppins', sans-serif;
            color: white;
            padding: 1.5rem;
        }

        .admin-card {
            width: 100%;
            max-width: 420px;
            background: var(--card-slate);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-slate);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .admin-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .admin-icon {
            font-size: 2.5rem;
            color: var(--accent-cyan);
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.4));
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white;
        }

        .header p {
            font-size: 0.75rem;
            color: #94a3b8;
            font-family: 'JetBrains Mono', monospace;
        }

        .form-group { margin-bottom: 1.5rem; }

        .label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            margin-bottom: 0.6rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .input-wrapper { position: relative; }

        .admin-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border-slate);
            border-radius: 8px;
            padding: 12px 12px 12px 42px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .admin-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 0.9rem;
        }

        .btn-root {
            width: 100%;
            padding: 1rem;
            background: var(--accent-cyan);
            color: var(--admin-bg);
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-root:hover {
            background: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .footer-links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .footer-links a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fecaca;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="header">
            <div class="admin-icon">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h1>Admin Console</h1>
            <p>Secure data and rule management</p>
        </div>

        <div id="message" class="message"></div>

        <form onsubmit="performAdminLogin(event)">
            <div class="form-group">
                <label class="label">System Identity</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-terminal icon"></i>
                    <input id="username" type="text" class="admin-input" placeholder="admin" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Access Key</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-key icon"></i>
                    <input id="password" type="password" class="admin-input" placeholder="Enter admin password" required>
                </div>
            </div>

            <button type="submit" class="btn-root">
                Initialize Login
            </button>
        </form>

        <div class="footer-links">
            Default local credentials: <strong>admin / Admin@123</strong><br>
            <a href="ram_landing.html">Back to Home</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.protocol.startsWith('http')
            ? `${window.location.protocol}//${window.location.hostname || '127.0.0.1'}:5000`
            : 'http://127.0.0.1:5000';

        if (window.location.origin !== API_BASE) {
            window.location.replace(`${API_BASE}/admin-login.html`);
        }

        function showMessage(message) {
            const node = document.getElementById('message');
            node.textContent = message;
            node.className = 'message error';
        }

        async function performAdminLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const payload = await response.json();
                if (!response.ok || payload.status === 'error') {
                    throw new Error(payload.message || 'Admin login failed.');
                }

                localStorage.setItem('role', 'admin');
                localStorage.setItem('userId', payload.data.username);
                localStorage.setItem('userName', payload.data.display_name);
                window.location.href = `${API_BASE}/${payload.data.redirect}`;
            } catch (error) {
                showMessage(error.message || 'Admin login failed.');
            }
        }
    </script>
</body>
</html>
