<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console | Infrastructure Root</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --admin-bg: #020617;
            --accent-cyan: #38bdf8;
            --card-slate: #1e293b;
            --border-slate: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--admin-bg);
            /* Subtle grid pattern background for a "system" feel */
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .admin-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-slate);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-slate);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Glow effect at the top */
        .admin-card::before {
            content: '';
            position: absolute;
            top: -1px; left: 50%; transform: translateX(-50%);
            width: 80%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .admin-icon {
            font-size: 2.5rem;
            color: var(--accent-cyan);
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.4));
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white;
        }

        .header p {
            font-size: 0.75rem;
            color: #94a3b8;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Form Logic */
        .form-group { margin-bottom: 1.5rem; }
        
        .label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            margin-bottom: 0.6rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .input-wrapper { position: relative; }

        .admin-input {
            width: 100%;
            background: #0f172a;
            border: 1px solid var(--border-slate);
            border-radius: 8px;
            padding: 12px 12px 12px 42px;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .admin-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 0.9rem;
        }

        .btn-root {
            width: 100%;
            padding: 1rem;
            background: var(--accent-cyan);
            color: var(--admin-bg);
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-root:hover {
            background: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .security-notice {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.65rem;
            color: #475569;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="header">
            <div class="admin-icon">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h1>Admin Console</h1>
            <p>Authorization Required [v3.0]</p>
        </div>

        <form>
            <div class="form-group">
                <label class="label">System Identity</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-terminal icon"></i>
                    <input type="text" class="admin-input" placeholder="root_user" required>
                </div>
            </div>

            <div class="form-group">
                <label class="label">Access Key</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-key icon"></i>
                    <input type="password" class="admin-input" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-root">
                Initialize Login
            </button>
        </form>

        <div class="security-notice">
            IP Address Logged. Unauthorized attempts are reported to university IT.
        </div>
    </div>
    <script>
        const API_BASE = "http://127.0.0.1:5000/api";

        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Target the inputs by their position or add IDs to your HTML
            const inputs = document.querySelectorAll('.admin-input');
            const username = inputs[0].value;
            const password = inputs[1].value;

            try {
                // This calls @admin_bp.route('/admin/login') in your admin.py
                const response = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password 
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === "success") {
                    // Store admin session details
                    localStorage.setItem("userName", "Administrator");
                    localStorage.setItem("role", "admin");
                    localStorage.setItem("userId", username);

                    // Redirect to the dashboard
                    window.location.href = data.redirect;
                } else {
                    alert(data.error || "Access Denied: Invalid System Identity or Key.");
                }
            } catch (error) {
                console.error("Connection Error:", error);
                alert("Infrastructure Offline: Could not connect to the authentication server.");
            }
        });
    </script>
</body>
</html>
