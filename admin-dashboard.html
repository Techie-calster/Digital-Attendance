<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevControl Ultra | Full DB Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #0f172a;
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent-blue);
            color: white;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }

        .header { margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.4rem; font-weight: 700; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.7rem;
            color: white;
            font-size: 0.85rem;
        }

        .btn-primary {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--text-dim); padding: 1rem; border-bottom: 1px solid var(--glass-border); }
        td { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

<nav class="sidebar">
    <h2 style="margin-bottom: 2rem; padding-left: 1rem;">DevControl</h2>
    <div class="nav-item active" onclick="switchTable('Students', this)"><i class="fa-solid fa-user-graduate"></i> Students</div>
    <div class="nav-item" onclick="switchTable('Faculty', this)"><i class="fa-solid fa-chalkboard-user"></i> Faculty</div>
    <div class="nav-item" onclick="switchTable('Subjects', this)"><i class="fa-solid fa-book"></i> Subjects</div>
    <div class="nav-item" onclick="switchTable('Student_Subject', this)"><i class="fa-solid fa-link"></i> Enrollment</div>
    <div class="nav-item" onclick="switchTable('Attendance', this)"><i class="fa-solid fa-calendar-check"></i> Attendance</div>
    <div class="nav-item" onclick="switchTable('Marks', this)"><i class="fa-solid fa-star"></i> Marks</div>
</nav>

<div class="main-content">
    <header class="header">
        <h1 id="currentTitle">Students Management</h1>
        <p style="color: var(--text-dim);">Insert and view entire database records</p>
    </header>

    <div class="grid">
        <aside class="glass-card">
            <h3 style="margin-bottom:1.5rem">Insert Record</h3>
            <div id="dynamicForm">
                </div>
            <button class="btn-primary" onclick="submitData()">Commit to Database</button>
        </aside>

        <main class="glass-card">
            <h3>Live Data</h3>
            <div id="tableDisplay" style="margin-top: 1rem;">
                </div>
        </main>
    </div>
</div>

<script>
let currentTable = 'Students';

// Schema mapping for all tables
const schema = {
    Students: ['name', 'enrollment_no', 'roll_no', 'year', 'branch', 'section', 'password'],
    Faculty: ['name', 'employee_id', 'department', 'password'],
    Subjects: ['subject_name', 'faculty_id'],
    Student_Subject: ['student_id', 'subject_id'],
    Attendance: ['student_id', 'subject_id', 'date', 'status'],
    Marks: ['student_id', 'subject_id', 'marks']
};

function switchTable(tableName, element) {
    currentTable = tableName;
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    element.classList.add('active');
    document.getElementById('currentTitle').innerText = tableName + " Management";
    renderForm();
    loadData();
}

function renderForm() {
    const container = document.getElementById('dynamicForm');
    container.innerHTML = '';
    schema[currentTable].forEach(field => {
        const type = (field === 'year' || field.includes('_id')) ? 'number' : (field === 'date' ? 'date' : (field === 'password' ? 'password' : 'text'));
        container.innerHTML += `
            <div class="input-group">
                <label>${field.replace('_', ' ')}</label>
                <input type="${type}" id="field_${field}" placeholder="Enter ${field}">
            </div>`;
    });
}

async function submitData() {
    const payload = {};
    schema[currentTable].forEach(field => {
        const val = document.getElementById(`field_${field}`).value;
        payload[field] = (document.getElementById(`field_${field}`).type === 'number') ? parseFloat(val) : val;
    });

    const res = await fetch('http://127.0.0.1:5000/api/admin/insert', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ table: currentTable, payload })
    });

    const result = await res.json();
    if(result.status === 'success') {
        alert('Record Added!');
        loadData();
    } else { alert('Error: ' + result.message); }
}

async function loadData() {
    const res = await fetch(`http://127.0.0.1:5000/api/admin/view?table=${currentTable}`);
    const data = await res.json();
    
    if(!data.records || data.records.length === 0) {
        document.getElementById('tableDisplay').innerHTML = "No records found.";
        return;
    }

    let html = '<table><thead><tr>';
    Object.keys(data.records[0]).forEach(key => html += `<th>${key}</th>`);
    html += '</tr></thead><tbody>';
    
    data.records.forEach(row => {
        html += '<tr>';
        Object.values(row).forEach(val => html += `<td>${val}</td>`);
        html += '</tr>';
    });
    
    document.getElementById('tableDisplay').innerHTML = html + '</tbody></table>';
}

window.onload = () => { renderForm(); loadData(); };
</script>
</body>
</html>
