<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevControl Ultra | Full DB Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: #0f172a;
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--glass-border);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent-blue);
            color: white;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }

        .header { margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.4rem; font-weight: 700; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.7rem;
            color: white;
            font-size: 0.85rem;
        }

        .btn-primary {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: var(--text-dim); padding: 1rem; border-bottom: 1px solid var(--glass-border); }
        td { padding: 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

<nav class="sidebar">
    <h2 style="margin-bottom: 2rem; padding-left: 1rem;">DevControl</h2>
    <div class="nav-item active" onclick="switchTable('Students', this)"><i class="fa-solid fa-user-graduate"></i> Students</div>
    <div class="nav-item" onclick="switchTable('Faculty', this)"><i class="fa-solid fa-chalkboard-user"></i> Faculty</div>
    <div class="nav-item" onclick="switchTable('Subjects', this)"><i class="fa-solid fa-book"></i> Subjects</div>
    <div class="nav-item" onclick="switchTable('Student_Subject', this)"><i class="fa-solid fa-link"></i> Enrollment</div>
    <div class="nav-item" onclick="switchTable('Attendance', this)"><i class="fa-solid fa-calendar-check"></i> Attendance Fixer</div>
    
    <div class="nav-item" onclick="logoutAdmin()" style="margin-top: auto; color: #ef4444;">
        <i class="fa-solid fa-power-off"></i> Logout System
    </div>
</nav>

<div class="main-content">
    <header class="header">
        <h1 id="currentTitle">Students Management</h1>
        <p style="color: var(--text-dim);">Insert and view entire database records</p>
    </header>

    <div class="grid">
        <aside class="glass-card">
            <h3 style="margin-bottom:1.5rem">Insert Record</h3>
            <div id="dynamicForm">
                </div>
            <button class="btn-primary" onclick="submitData()">Commit to Database</button>
        </aside>

        <main class="glass-card">
            <h3>Live Data</h3>
            <div id="tableDisplay" style="margin-top: 1rem;">
                </div>
        </main>
    </div>
</div>

<script>
    const API_BASE = "http://127.0.0.1:5000/api";
    let currentTable = 'students';
    let attendanceFixes = []; // Temporary storage for attendance status changes

    // Schema mapping for Admin operations
    const schema = {
        students: ['name', 'enrollment_no', 'roll_no', 'year', 'branch', 'section','password'],
        faculty: ['name', 'employee_id', 'department','password'],
        subjects: ['subject_name', 'faculty_id'],
        'assign-subject': ['student_id', 'subject_id'],
        attendance: ['subject_id', 'date'] // Admin inputs these to fetch the editable list
    };

    const tableToRoute = {
        'Students': 'students',
        'Faculty': 'faculty',
        'Subjects': 'subjects',
        'Student_Subject': 'assign-subject',
        'Attendance': 'attendance'
    };

    function switchTable(displayName, element) {
        currentTable = tableToRoute[displayName] || displayName.toLowerCase();
        
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('currentTitle').innerText = displayName + " Management";
        
        // Reset temporary state when switching tabs
        attendanceFixes = [];
        renderForm();
        loadData();
    }

    function renderForm() {
        const container = document.getElementById('dynamicForm');
        container.innerHTML = '';
        
        const fields = schema[currentTable] || [];
        fields.forEach(field => {
            let type = (field.includes('_id') || field === 'year') ? 'text' : 'text';
            if (field === 'date') type = 'date';

            container.innerHTML += `
                <div class="input-group">
                    <label>${field.replace('_', ' ')}</label>
                    <input type="${type}" id="field_${field}" placeholder="Enter ${field}">
                </div>`;
        });

        // Update the main button based on the active tab
        const btn = document.querySelector('.btn-primary');
        if (currentTable === 'attendance') {
            btn.innerText = "Fetch Attendance for Fixing";
            btn.onclick = fetchAttendanceForAdmin;
        } else {
            btn.innerText = "Commit to Database";
            btn.onclick = submitData;
        }
    }

    // --- STANDARD MANAGEMENT (STUDENTS/FACULTY/SUBJECTS) ---

    async function submitData() {
    const payload = {};
    let fields = [];

    // Special handling for Enrollment tab
    if (currentTable === 'assign-subject') {
        payload.student_id = parseInt(document.getElementById('field_student_id').value);
        payload.subject_id = parseInt(document.getElementById('field_subject_id').value);
    } else {
        fields = schema[currentTable];

        fields.forEach(field => {
            const input = document.getElementById(`field_${field}`);
            payload[field] = (input.type === 'number')
                ? parseInt(input.value)
                : input.value;
        });
    }

        try {
            let endpoint = currentTable;

            if (currentTable === 'assign-subject') {
                endpoint = 'assign-subject';
            }

            console.log("Submitting to:", endpoint);
            console.log("Payload JSON:", JSON.stringify(payload));

            const url = currentTable === 'assign-subject'
                ? `${API_BASE}/assign-subject`
                : `${API_BASE}/admin/${endpoint}`;

            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const result = await res.json();
            if (res.ok) {
                alert('Success: Record added.');

                // --- CLEAR ALL FIELDS AFTER SUCCESS ---
                (schema[currentTable] || []).forEach(field => {
                    const input = document.getElementById(`field_${field}`);
                    if (input) {
                        input.value = '';
                    }
                });

                loadData(); // Refresh the table
            } else {
                alert('Error: ' + (result.error || result.message));
            }
        } catch (err) {
            alert('Server connection failed.');
        }
    }

    async function loadData() {
    const display = document.getElementById('tableDisplay');

    try {
        // Attendance fixer should not auto-fetch immediately
        if (currentTable === 'assign-subject') {
            display.innerHTML = `
                <div style="color:#cbd5e1; line-height:1.8;">
                    <h3 style="color:white; margin-bottom:12px;">Enrollment Mapping</h3>
                    <p>This section connects a student to a subject.</p>

                    <ul style="margin-top:12px; padding-left:20px;">
                        <li>Enter the Student ID on the left</li>
                        <li>Enter the Subject ID to assign</li>
                        <li>Click "Commit to Database"</li>
                    </ul>

                    <div style="margin-top:16px; padding:12px; border-radius:10px; background:rgba(59,130,246,0.12); color:#93c5fd;">
                        Example: Student ID = 3, Subject ID = 2 → Student 3 is enrolled in Subject 2
                    </div>
                </div>
            `;
            return;
        }

        if (currentTable === 'attendance') {
            display.innerHTML = `
                <div style="color:#cbd5e1; line-height:1.8;">
                    <h3 style="color:white; margin-bottom:12px;">Attendance Correction Panel</h3>
                    <p>Use this section to correct attendance already marked by faculty.</p>

                    <ul style="margin-top:12px; padding-left:20px;">
                        <li>Enter the Subject ID</li>
                        <li>Select the date of the class</li>
                        <li>Click "Fetch Attendance for Fixing"</li>
                        <li>You can then change Present ↔ Absent and save</li>
                    </ul>

                    <div style="margin-top:16px; padding:12px; border-radius:10px; background:rgba(239,68,68,0.12); color:#fca5a5;">
                        Example: If a student was marked Absent by mistake, you can correct it here.
                    </div>
                </div>
            `;
            return;
        }

        // Enrollment tab should fetch student-subject records, not assign-subject

        let endpoint = currentTable;

        if (currentTable === 'assign-subject') {
            endpoint = 'student-subject';
        }

        const res = await fetch(`${API_BASE}/admin/${endpoint}`);

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        if (!data || data.length === 0) {
            display.innerHTML = "No records found.";
            return;
        }

        let html = '<table><thead><tr>';
        Object.keys(data[0]).forEach(key => html += `<th>${key}</th>`);
        html += '</tr></thead><tbody>';

        data.forEach(row => {
            html += '<tr>';
            Object.values(row).forEach(val => {
                const cell = (typeof val === 'object' && val !== null)
                    ? JSON.stringify(val)
                    : val;

                html += `<td>${cell ?? '-'}</td>`;
            });
            html += '</tr>';
        });

        html += '</tbody></table>';
        display.innerHTML = html;

    } catch (err) {
        console.error("loadData error:", err);
        display.innerHTML = "Error loading data.";
    }
}

    // --- ATTENDANCE FIXER LOGIC (ADMIN OVERRIDE) ---

    async function fetchAttendanceForAdmin() {
        const subId = document.getElementById('field_subject_id').value;
        const date = document.getElementById('field_date').value;
        const formattedDate = date;

        if(!subId || !date) return alert("Subject ID and Date are required to locate mistakes.");

        try {
            console.log("Subject:", subId);
            console.log("Date:", date);
            console.log("Formatted Date:", formattedDate);

            const res = await fetch(`${API_BASE}/admin/attendance-view?subject_id=${subId}&date=${formattedDate}`);

            console.log("Status:", res.status);

            const data = await res.json();
            console.log("Returned data:", data);

            renderAttendanceEditor(data);
        } catch (err) {
    console.error(err);
    alert("Failed to fetch attendance records: " + err.message);
}
}
    function renderAttendanceEditor(records) {
        const display = document.getElementById('tableDisplay');
        if (!records || records.length === 0) {
            display.innerHTML = "No attendance records found for this selection.";
            return;
        }

        let html = `<h3>Editing Session: ${document.getElementById('field_date').value}</h3>`;
        html += '<table><thead><tr><th>Student</th><th>Roll No</th><th>Current Status</th><th>Action</th></tr></thead><tbody>';

        records.forEach(row => {
            html += `
                <tr>
                    <td>${row.students.name}</td>
                    <td>${row.students.roll_no}</td>
                    <td id="status_${row.attendance_id}" style="font-weight:bold;">${row.status}</td>
                    <td>
                        <button onclick="toggleAdminStatus(${row.attendance_id})" class="btn-edit" style="background:#475569; color:white; border-radius:8px; padding:5px 10px; cursor:pointer; border:none;">Flip Status</button>
                    </td>
                </tr>`;
        });
        html += '</tbody></table>';
        html += `<button class="btn-primary" onclick="saveAdminAttendanceFix()" style="margin-top:20px;">Push Corrections to Database</button>`;
        display.innerHTML = html;
    }

    function toggleAdminStatus(id) {
        const td = document.getElementById(`status_${id}`);
        const newStatus = td.innerText === 'Present' ? 'Absent' : 'Present';
        td.innerText = newStatus;
        
        // Add to buffer for bulk update
        const existing = attendanceFixes.find(f => f.attendance_id === id);
        if (existing) {
            existing.status = newStatus;
        } else {
            attendanceFixes.push({ attendance_id: id, status: newStatus });
        }
    }

    async function saveAdminAttendanceFix() {
        if (attendanceFixes.length === 0) return alert("No corrections were made to the current list.");

        try {
            const res = await fetch(`${API_BASE}/admin/attendance-update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(attendanceFixes)
            });

            if (res.ok) {
                alert("Attendance corrected successfully in the database.");
                attendanceFixes = []; // Clear buffer
                fetchAttendanceForAdmin(); // Refresh the list
            }
        } catch (err) {
            alert("Failed to push corrections.");
        }
    }

    // --- SESSION SECURITY GUARD ---
    function checkAdminSession() {
        const role = localStorage.getItem("role");
        const user = localStorage.getItem("userId");

        // If no admin session is found, kick them back to the login page
        if (role !== "admin" || !user) {
            window.location.href = "admin-login.html";
        }
    }

    // --- SECURE ADMIN SESSION GUARD ---
    function verifyAdminAccess() {
        const role = localStorage.getItem("role");
        const user = localStorage.getItem("userId");

        // If session is invalid, overwrite history entry with admin-login.html
        if (role !== "admin" || !user) {
            window.location.replace("admin-login.html");
        }
    }

    // Handle "Back" swipe or button press (detects page visibility from cache)
    window.addEventListener('pageshow', function(event) {
        // Force re-check if the page is loaded from the back-forward cache
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            verifyAdminAccess();
        }
    });

    // --- LOGOUT LOGIC ---
    function logoutAdmin() {
        // Completely wipe all stored credentials
        localStorage.clear();
        
        // Use replace so the dashboard is removed from the browser history
        window.location.replace("admin-login.html");
    }

    // Update window.onload to include the security check
    window.onload = () => { 
        verifyAdminAccess(); // Verify identity before loading anything
        renderForm(); 
        loadData(); 
    };
</script>
</body>
</html>
